id: ErTools_AWGN
label: AWGN
category: '[ErTools]'

templates:
  imports: from gnuradio import ErTools
  make: ErTools.AWGN(${M})

parameters:
- id: M
  label: Počet modulačných stavov
  dtype: int
  default: 2

inputs:
 - label: in0
   domain: stream
   dtype: complex
 - label: in1
   domain: stream
   dtype: float

outputs:
 - label: out
   domain: stream
   dtype: complex

file_format: 1
