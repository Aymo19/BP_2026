id: ErTools_MC
label: MC
category: '[ErTools]'

templates:
  imports: from gnuradio import ErTools
  make: ErTools.MC(${N}, ${EbN0min}, ${EbN0max})

parameters:
- id: N
  label: Počet Eb/N0 bodov
  dtype: int
  default: 256
- id: EbN0min
  label: Minimálna Eb/N0
  dtype: int
  default: 0
- id: EbN0max
  label: Maximálna Eb/N0
  dtype: int
  default: 15

outputs:
 - label: out0
   domain: stream
   dtype: float
 - label: out1
   domain: stream
   dtype: int
#  'file_format' specifies the version of the GRC yml format used in the file
#  and should usually not be changed.
file_format: 1
