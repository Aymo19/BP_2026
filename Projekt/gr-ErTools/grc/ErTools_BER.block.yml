id: ErTools_BER
label: BER
category: '[ErTools]'

templates:
  imports: from gnuradio import ErTools
  make: ErTools.BER(${N}, ${M})

parameters:
 - id: N
   label: Počet Eb/N0 bodov
   dtype: int
   default: 128
 - id: M
   label: Počet modulačných stavov
   dtype: int

inputs:
 - label: in0
   domain: stream
   dtype: int

 - label: in1
   domain: stream
   dtype: byte

 - label: in2
   domain: stream
   dtype: byte

outputs:
 - label: out
   domain: stream 
   dtype: float

file_format: 1
